name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
              $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          } else {
              $version = "0.0.0"
          }

          # MSI's MajorUpgrade comparison only honors the first three ProductVersion
          # fields, so a prerelease suffix on the semver tag would otherwise collapse
          # every alpha to the same MSI version and trigger maintenance mode instead
          # of an upgrade. Map the prerelease stage onto the MSI minor field and use
          # the prerelease counter as the build field so each tag is strictly greater
          # than the previous one within a stage:
          #   *-alpha.N -> 0.1.N
          #   *-beta.N  -> 0.2.N
          #   final     -> semver as-is (must be >= 0.3.0 to upgrade past beta)
          $isPrerelease = "false"
          if ($version -match '^\d+\.\d+\.\d+-alpha\.(\d+)$') {
              $msiVersion = "0.1.$($Matches[1])"
              $isPrerelease = "true"
          } elseif ($version -match '^\d+\.\d+\.\d+-beta\.(\d+)$') {
              $msiVersion = "0.2.$($Matches[1])"
              $isPrerelease = "true"
          } elseif ($version -match '^\d+\.\d+\.\d+$') {
              $msiVersion = $version
          } else {
              $msiVersion = ($version -split '-')[0]
              if ($version -match '-') { $isPrerelease = "true" }
          }

          echo "PackageVersion=$version" >> $env:GITHUB_ENV
          echo "MsiVersion=$msiVersion" >> $env:GITHUB_ENV
          echo "IsPrerelease=$isPrerelease" >> $env:GITHUB_ENV
          Write-Host "Version: $version (MSI: $msiVersion, Prerelease: $isPrerelease)"

      - name: Restore
        run: dotnet restore DocRAG.slnx

      - name: Build
        run: dotnet build DocRAG.slnx --configuration Release --no-restore -p:TreatWarningsAsErrors=true -p:Version=${{ env.PackageVersion }}

      - name: Test
        run: dotnet test DocRAG.slnx --configuration Release --no-build

      - name: Publish
        run: dotnet publish DocRAG.Mcp/DocRAG.Mcp.csproj --configuration Release --runtime win-x64 --self-contained true --output ./artifacts/${{ env.PackageVersion }}/publish -p:Version=${{ env.PackageVersion }}

      - name: Install WiX
        run: dotnet tool install --global wix --version 5.0.2

      - name: Add WiX extensions
        run: |
          wix extension add WixToolset.Util.wixext/5.0.2
          wix extension add WixToolset.UI.wixext/5.0.2

      - name: Build MSI
        run: wix build DocRAG.Installer/Package.wxs -d PublishDir=${{ github.workspace }}/artifacts/${{ env.PackageVersion }}/publish -d Version=${{ env.MsiVersion }} -ext WixToolset.Util.wixext -ext WixToolset.UI.wixext -arch x64 -o ./artifacts/${{ env.PackageVersion }}/DocRAG.Mcp.msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocRAG.Mcp-${{ env.PackageVersion }}
          path: ./artifacts/${{ env.PackageVersion }}/DocRAG.Mcp.msi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/${{ env.PackageVersion }}/DocRAG.Mcp.msi
          prerelease: ${{ env.IsPrerelease }}

      - name: Kill orphan processes
        if: always()
        run: |
          Get-Process -Name dotnet, VBCSCompiler -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue
