name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore DocRAG.slnx

      - name: Build
        run: dotnet build DocRAG.slnx --configuration Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test DocRAG.slnx --configuration Release --no-build

      - name: Kill orphan processes
        if: always()
        run: |
          Get-Process -Name conhost -ErrorAction SilentlyContinue |
            Where-Object { $_.StartTime -gt (Get-Date).AddMinutes(-10) } |
            Stop-Process -Force -ErrorAction SilentlyContinue
